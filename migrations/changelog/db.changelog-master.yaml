databaseChangeLog:
  # Auth schema migrations
  - changeSet:
      id: auth-001
      author: system
      comment: Create better-auth tables in auth schema
      changes:
        - sqlFile:
            path: changes/auth/001-create-auth-tables.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true
  - changeSet:
      id: auth-002
      author: system
      comment: Create JWKS table for JWT plugin
      changes:
        - sqlFile:
            path: changes/auth/002-create-jwks-table.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true

  - changeSet:
      id: auth-003
      author: system
      comment: Add durable administrative user disable state and revoke sessions on disable
      changes:
        - sqlFile:
            path: changes/auth/003-add-user-disable-state.sql
            relativeToChangelogFile: true
            splitStatements: false
            stripComments: true
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP TRIGGER IF EXISTS reject_session_for_disabled_user ON auth.sessions;
              DROP FUNCTION IF EXISTS auth.reject_session_for_disabled_user();
              DROP TRIGGER IF EXISTS revoke_sessions_when_user_disabled ON auth.users;
              DROP FUNCTION IF EXISTS auth.revoke_sessions_when_user_disabled();
              ALTER TABLE auth.users DROP COLUMN IF EXISTS disabled;

  - changeSet:
      id: auth-004
      author: system
      comment: Add generic workload principal, token, and DPoP replay state
      changes:
        - sqlFile:
            path: changes/auth/004-create-workload-identity-tables.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true
      rollback:
        - sql:
            splitStatements: true
            sql: |
              DROP TABLE IF EXISTS auth.workload_dpop_replays;
              DROP TABLE IF EXISTS auth.workload_tokens;
              DROP TABLE IF EXISTS auth.workload_grants;
              DROP TABLE IF EXISTS auth.workload_principals;
